<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Range Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #151918;
    --surface2: #1d2420;
    --border: #2a332f;
    --green: #4ade80;
    --green-dim: #22543d;
    --green-muted: #1a3028;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e8ede9;
    --text-mid: #8fa89a;
    --text-dim: #4a5e54;
    --mono: 'DM Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--green);
  }
  .origin-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-mid);
    background: var(--surface);
  }
  .origin-badge.set {
    border-color: var(--green-dim);
    color: var(--green);
    background: var(--green-muted);
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 57px;
    z-index: 9;
  }
  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  /* CONTENT */
  .pane { display: none; flex-direction: column; flex: 1; }
  .pane.active { display: flex; }

  /* CAPTURE PANE */
  .capture-inner {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
  }

  /* Origin setup */
  .origin-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .origin-coords {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.97); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mid);
  }
  .btn-outline:hover { border-color: var(--green-dim); color: var(--green); }
  .btn-origin {
    background: var(--green-muted);
    border: 1px solid var(--green-dim);
    color: var(--green);
  }
  .btn-primary {
    background: var(--green);
    color: #0a1a10;
    font-size: 17px;
    padding: 20px;
  }
  .btn-primary:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }
  .btn-danger {
    background: transparent;
    border: 1px solid #442020;
    color: var(--red);
    font-size: 13px;
    padding: 12px;
  }

  /* Club selector */
  .club-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .club-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .club-btn {
    padding: 12px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
  }
  .club-btn:active { transform: scale(0.95); }
  .club-btn.selected {
    background: var(--green-muted);
    border-color: var(--green);
    color: var(--green);
  }

  /* Log shot big button area */
  .log-section {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .gps-status {
    font-family: var(--mono);
    font-size: 11px;
    text-align: center;
    color: var(--text-dim);
    min-height: 16px;
  }
  .gps-status.acquiring { color: var(--amber); }
  .gps-status.ready { color: var(--green); }
  .gps-status.error { color: var(--red); }

  /* Last shot feedback */
  .last-shot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .last-shot-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .last-shot-dist { font-family: var(--mono); font-size: 28px; color: var(--green); font-weight: 500; }
  .last-shot-unit { font-size: 13px; color: var(--text-mid); margin-left: 4px; }
  .last-shot-club { font-family: var(--mono); font-size: 14px; color: var(--text-mid); }

  /* SHOTS PANE */
  .shots-inner { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

  /* Stats table */
  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .stats-card-header {
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 10px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 400;
  }
  th:not(:first-child) { text-align: right; }
  td {
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  td:not(:first-child) { text-align: right; }
  tr:last-child td { border-bottom: none; }
  .td-club { color: var(--green); font-weight: 500; }
  .td-avg { color: var(--amber); }
  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* Shot log list */
  .shot-list { display: flex; flex-direction: column; gap: 6px; }
  .shot-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  .shot-item-left { display: flex; flex-direction: column; gap: 2px; }
  .shot-item-club { font-family: var(--mono); font-size: 15px; color: var(--green); font-weight: 500; }
  .shot-item-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .shot-item-dist { font-family: var(--mono); font-size: 20px; color: var(--text); }
  .shot-item-unit { font-size: 11px; color: var(--text-dim); }
  .shot-delete {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: #3a1515;
    border-radius: 0 8px 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: width 0.2s;
    cursor: pointer;
    color: var(--red);
    font-size: 13px;
    font-family: var(--mono);
  }
  .shot-item:hover .shot-delete { width: 64px; }

  .danger-zone {
    border: 1px solid #3a1515;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .danger-label { font-size: 13px; color: var(--text-dim); }

  /* Pulse animation for GPS acquiring */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .acquiring { animation: pulse 1.2s ease-in-out infinite; }

  /* Flash animation for logged shot */
  @keyframes flash {
    0% { border-color: var(--green); }
    100% { border-color: var(--border); }
  }
  .flash { animation: flash 0.8s ease-out; }
</style>
</head>
<body>

<header>
  <h1>⛳ Range Tracker</h1>
  <div class="origin-badge" id="originBadge">No origin</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('capture')">Capture</div>
  <div class="tab" onclick="showTab('shots')">Shots</div>
</div>

<!-- CAPTURE PANE -->
<div class="pane active" id="pane-capture">
  <div class="capture-inner">

    <div class="origin-section" id="originSection">
      <div class="section-label">Origin point</div>
      <div class="origin-coords" id="originCoords">Not set — stand at your bay mat</div>
      <button class="btn btn-origin" onclick="setOrigin()">📍 Set origin here</button>
    </div>

    <div class="club-section">
      <div class="section-label">Club</div>
      <div class="club-grid" id="clubGrid"></div>
    </div>

    <div id="lastShotContainer" style="display:none">
      <div class="last-shot" id="lastShot">
        <div>
          <div class="last-shot-label">Last shot</div>
          <div class="last-shot-club" id="lastShotClub">—</div>
        </div>
        <div>
          <span class="last-shot-dist" id="lastShotDist">—</span>
          <span class="last-shot-unit">yds</span>
        </div>
      </div>
    </div>

    <div class="log-section">
      <div class="gps-status" id="gpsStatus">GPS not active</div>
      <button class="btn btn-primary" id="logBtn" onclick="logShot()" disabled>
        Log Shot
      </button>
    </div>

  </div>
</div>

<!-- SHOTS PANE -->
<div class="pane" id="pane-shots">
  <div class="shots-inner">

    <div class="stats-card">
      <div class="stats-card-header">Per club averages</div>
      <div id="statsContent">
        <div class="empty-state">No shots yet</div>
      </div>
    </div>

    <div class="section-label" style="margin-top:4px">Shot log</div>
    <div class="shot-list" id="shotList">
      <div class="empty-state">No shots logged this session</div>
    </div>

    <div class="danger-zone">
      <div class="danger-label">Clear all shot data</div>
      <button class="btn btn-danger" onclick="clearAll()" style="width:auto;padding:10px 16px">Clear</button>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const CLUBS = ['Dr','3W','5W','4i','5i','6i','7i','8i','9i','PW','GW','SW','LW'];
  let selectedClub = '7i';
  let origin = null;
  let shots = [];

  // ── Persistence ────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('rt_origin', JSON.stringify(origin));
    localStorage.setItem('rt_shots', JSON.stringify(shots));
  }
  function load() {
    try { origin = JSON.parse(localStorage.getItem('rt_origin')) || null; } catch(e) { origin = null; }
    try { shots = JSON.parse(localStorage.getItem('rt_shots')) || []; } catch(e) { shots = []; }
  }

  // ── Haversine ──────────────────────────────────────────────────────────
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2 - lat1) * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function metresToYards(m) { return m * 1.09361; }

  // ── GPS ────────────────────────────────────────────────────────────────
  function getPos() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('GPS not supported')); return; }
      setGpsStatus('acquiring', 'Acquiring GPS…');
      navigator.geolocation.getCurrentPosition(
        p => resolve(p.coords),
        e => reject(e),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });
  }

  // ── Origin ─────────────────────────────────────────────────────────────
  async function setOrigin() {
    try {
      const coords = await getPos();
      origin = { lat: coords.latitude, lon: coords.longitude, acc: coords.accuracy };
      save();
      updateOriginUI();
      setGpsStatus('ready', `GPS ready — accuracy ±${Math.round(origin.acc)}m`);
    } catch(e) {
      setGpsStatus('error', 'Could not get GPS — check permissions');
    }
  }
  function updateOriginUI() {
    if (origin) {
      document.getElementById('originCoords').textContent =
        `${origin.lat.toFixed(6)}, ${origin.lon.toFixed(6)}`;
      document.getElementById('originBadge').textContent = 'Origin set';
      document.getElementById('originBadge').classList.add('set');
      document.getElementById('logBtn').disabled = false;
    }
  }

  // ── Log Shot ───────────────────────────────────────────────────────────
  async function logShot() {
    if (!origin) { alert('Set origin first'); return; }
    if (!selectedClub) { alert('Select a club first'); return; }
    const btn = document.getElementById('logBtn');
    btn.disabled = true;
    btn.textContent = 'Getting GPS…';
    try {
      const coords = await getPos();
      const metres = haversine(origin.lat, origin.lon, coords.latitude, coords.longitude);
      const yards = Math.round(metresToYards(metres));
      const shot = {
        id: Date.now(),
        club: selectedClub,
        yards,
        metres: Math.round(metres),
        acc: Math.round(coords.accuracy),
        time: new Date().toISOString()
      };
      shots.push(shot);
      save();
      setGpsStatus('ready', `Logged — GPS accuracy ±${shot.acc}m`);
      showLastShot(shot);
      renderShots();
    } catch(e) {
      setGpsStatus('error', 'GPS error — try again');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log Shot';
    }
  }

  // ── UI Helpers ─────────────────────────────────────────────────────────
  function setGpsStatus(state, msg) {
    const el = document.getElementById('gpsStatus');
    el.className = 'gps-status ' + state;
    el.textContent = msg;
  }

  function showLastShot(shot) {
    document.getElementById('lastShotContainer').style.display = 'block';
    document.getElementById('lastShotClub').textContent = shot.club;
    document.getElementById('lastShotDist').textContent = shot.yards;
    const el = document.getElementById('lastShot');
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function buildClubGrid() {
    const grid = document.getElementById('clubGrid');
    grid.innerHTML = '';
    CLUBS.forEach(c => {
      const btn = document.createElement('div');
      btn.className = 'club-btn' + (c === selectedClub ? ' selected' : '');
      btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedClub = c;
      };
      grid.appendChild(btn);
    });
  }

  function renderShots() {
    // Stats
    const statsEl = document.getElementById('statsContent');
    const byClub = {};
    shots.forEach(s => {
      if (!byClub[s.club]) byClub[s.club] = [];
      byClub[s.club].push(s.yards);
    });
    const clubOrder = CLUBS.filter(c => byClub[c]);
    if (clubOrder.length === 0) {
      statsEl.innerHTML = '<div class="empty-state">No shots yet</div>';
    } else {
      let html = '<table><thead><tr><th>Club</th><th>Shots</th><th>Avg (yds)</th><th>Max</th></tr></thead><tbody>';
      clubOrder.forEach(c => {
        const arr = byClub[c];
        const avg = Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
        const max = Math.max(...arr);
        html += `<tr>
          <td class="td-club">${c}</td>
          <td>${arr.length}</td>
          <td class="td-avg">${avg}</td>
          <td>${max}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      statsEl.innerHTML = html;
    }

    // Shot list
    const listEl = document.getElementById('shotList');
    if (shots.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No shots logged</div>';
      return;
    }
    listEl.innerHTML = '';
    [...shots].reverse().forEach(s => {
      const t = new Date(s.time);
      const timeStr = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const item = document.createElement('div');
      item.className = 'shot-item';
      item.innerHTML = `
        <div class="shot-item-left">
          <div class="shot-item-club">${s.club}</div>
          <div class="shot-item-time">${timeStr} · ±${s.acc}m GPS</div>
        </div>
        <div>
          <span class="shot-item-dist">${s.yards}</span>
          <span class="shot-item-unit">yds</span>
        </div>
        <div class="shot-delete" onclick="deleteShot(${s.id})">✕ Del</div>
      `;
      listEl.appendChild(item);
    });
  }

  function deleteShot(id) {
    shots = shots.filter(s => s.id !== id);
    save();
    renderShots();
  }

  function clearAll() {
    if (!confirm('Clear all shots? This cannot be undone.')) return;
    shots = [];
    save();
    renderShots();
    document.getElementById('lastShotContainer').style.display = 'none';
  }

  function showTab(name) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('pane-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'shots') renderShots();
  }

  // ── Init ───────────────────────────────────────────────────────────────
  load();
  buildClubGrid();
  updateOriginUI();
  renderShots();

  // Warm up GPS on load if we already have an origin
  if (origin) {
    setGpsStatus('ready', 'Origin loaded — GPS ready');
    document.getElementById('logBtn').disabled = false;
  }
</script>
</body>
</html>
